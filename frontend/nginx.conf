# =============================================================================
# nginx config for React SPA + backend proxy
# =============================================================================
#
# Handles three concerns:
#   1. Static assets from /usr/share/nginx/html (the Vite build)
#   2. React Router — any path the browser navigates to directly returns
#      index.html so client-side routing works
#   3. /api/* and /ws/* are proxied to the backend container so the browser
#      never has to know the backend port — avoids CORS entirely in Docker.
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------------------------
    # Proxy /api/v1/** to FastAPI backend
    # -------------------------------------------------------------------------
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Pipeline runs can take 30-120 s — generous timeouts
        proxy_read_timeout  180s;
        proxy_send_timeout  180s;

        # Allow large image uploads (up to 50 MB)
        client_max_body_size 50m;
    }

    # -------------------------------------------------------------------------
    # Proxy WebSocket connections for real-time pipeline progress
    # -------------------------------------------------------------------------
    location /ws/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;   # Hold WS connections open for up to 1 hour
    }

    # -------------------------------------------------------------------------
    # Static assets — aggressive caching for hashed filenames
    # -------------------------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # -------------------------------------------------------------------------
    # React Router — fall back to index.html for all unmatched routes
    # -------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
